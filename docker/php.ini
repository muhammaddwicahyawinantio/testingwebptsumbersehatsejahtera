; Override untuk aplikasi (di atas php.ini-production)
memory_limit = 256M

; Upload gambar via Filament (default 2M terlalu kecil)
upload_max_filesize = 20M
post_max_size = 25M

; OPcache: kode tidak berubah di dalam container, matikan cek timestamp
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
